name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Calidad del monorepo
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pliegocheck
          POSTGRES_PASSWORD: pliegocheck
          POSTGRES_DB: pliegocheck
        ports:
          - 56543:5432
        options: >-
          --health-cmd "pg_isready -U pliegocheck -d pliegocheck"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://pliegocheck:pliegocheck@localhost:56543/pliegocheck
      PLIEGOCHECK_TEST_DATABASE_URL: postgresql+psycopg://pliegocheck:pliegocheck@localhost:56543/pliegocheck_test
      PLIEGOCHECK_STORAGE_PATH: ./var/documents
      PLIEGOCHECK_MAX_FILE_SIZE_MB: "20"
      PLIEGOCHECK_EXTRACTION_MAX_SECONDS: "10"
      PLIEGOCHECK_EXTRACTION_MAX_CHARACTERS: "2000000"
      PLIEGOCHECK_EXTRACTION_MAX_PAGES: "500"
      PLIEGOCHECK_EXTRACTION_MAX_SHEETS: "50"
      PLIEGOCHECK_EXTRACTION_MAX_ROWS_PER_SHEET: "10000"
      PLIEGOCHECK_EXTRACTION_MAX_ZIP_ENTRIES: "5000"
      PLIEGOCHECK_EXTRACTION_MAX_UNCOMPRESSED_MB: "200"
      PLIEGOCHECK_EXTRACTION_MAX_COMPRESSION_RATIO: "100"
      PLIEGOCHECK_WORKER_MAX_ATTEMPTS: "3"
      PLIEGOCHECK_AI_ENABLED: "false"
      OPENAI_API_KEY: ""
      OPENAI_NORMALIZATION_MODEL: gpt-5.5-pro
      OPENAI_NORMALIZATION_REASONING_EFFORT: high
      OPENAI_NORMALIZATION_BACKGROUND: "true"
      OPENAI_NORMALIZATION_MAX_OUTPUT_TOKENS: "16000"
      OPENAI_NORMALIZATION_TIMEOUT_SECONDS: "600"
      OPENAI_NORMALIZATION_POLL_INTERVAL_SECONDS: "5"
      OPENAI_NORMALIZATION_MAX_CALLS_PER_RUN: "50"
      OPENAI_NORMALIZATION_MAX_SEGMENTS_PER_BATCH: "25"
      OPENAI_NORMALIZATION_MAX_CHARACTERS_PER_BATCH: "40000"
      OPENAI_NORMALIZATION_MAX_TOTAL_CHARACTERS: "500000"
      OPENAI_NORMALIZATION_MAX_RETRIES: "3"
      PLIEGOCHECK_ALLOW_FAKE_NORMALIZATION_PROVIDER: "true"
      PLIEGOCHECK_ALLOWED_WEB_ORIGINS: http://localhost:3000
      PLIEGOCHECK_CORS_ALLOWED_ORIGINS: http://localhost:3000
      PLIEGOCHECK_ENVIRONMENT: test
      PLIEGOCHECK_AUTH_ENABLED: "false"
      PLIEGOCHECK_AUTH_SECRET_KEY: ""
      PLIEGOCHECK_SECURITY_HEADERS_ENABLED: "true"
      PLIEGOCHECK_PILOT_MODE: "false"
      PLIEGOCHECK_SECOP_ENABLED: "false"
      PLIEGOCHECK_SECOP_PROVIDER: datos_abiertos
      PLIEGOCHECK_SECOP_BASE_URL: https://www.datos.gov.co
      PLIEGOCHECK_SECOP_APP_TOKEN: ""
      PLIEGOCHECK_SECOP_TIMEOUT_SECONDS: "30"
      PLIEGOCHECK_SECOP_MAX_PAGE_SIZE: "100"
      PLIEGOCHECK_SECOP_RATE_LIMIT_PER_MINUTE: "60"
      PLIEGOCHECK_SECOP_CACHE_TTL_MINUTES: "60"
      PLIEGOCHECK_SECOP_ALLOW_LIVE_TESTS: "false"
      PLIEGOCHECK_SECOP_DOCUMENT_SYNC_ENABLED: "true"
      PLIEGOCHECK_SECOP_DOCUMENT_DOWNLOAD_ENABLED: "true"
      PLIEGOCHECK_SECOP_DOCUMENT_MAX_FILE_SIZE_BYTES: "1048576"
      PLIEGOCHECK_SECOP_DOCUMENT_MAX_FILES_PER_SYNC: "25"
      PLIEGOCHECK_SECOP_DOCUMENT_TIMEOUT_SECONDS: "5"
      PLIEGOCHECK_SECOP_DOCUMENT_MAX_REDIRECTS: "2"
      PLIEGOCHECK_SECOP_DOCUMENT_ALLOWED_HOSTS: files.example.gov.co
      PLIEGOCHECK_SECOP_DOCUMENT_ALLOW_LIVE_TESTS: "false"
      PLIEGOCHECK_SECOP_INCREMENTAL_SYNC_ENABLED: "true"
      PLIEGOCHECK_OPPORTUNITIES_ENABLED: "true"
      PLIEGOCHECK_OPPORTUNITIES_MAX_CANDIDATES: "100"
      PLIEGOCHECK_EXTERNAL_DELIVERY_ENABLED: "false"
      PLIEGOCHECK_NOTIFICATION_DRY_RUN: "true"
      PLIEGOCHECK_EMAIL_ENABLED: "false"
      PLIEGOCHECK_WEBHOOK_ENABLED: "false"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Configurar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Instalar dependencias Node
        run: pnpm install --frozen-lockfile

      - name: Instalar dependencias Python
        run: uv sync --all-packages --frozen

      - name: Crear base de datos de pruebas
        run: |
          uv run python -c "import psycopg; conn = psycopg.connect('postgresql://pliegocheck:pliegocheck@localhost:56543/pliegocheck', autocommit=True); conn.execute('CREATE DATABASE pliegocheck_test'); conn.close()"

      - name: Migraciones desde base vacia
        run: pnpm db:migrate

      - name: Alembic actualizado
        run: pnpm db:check

      - name: Contratos sincronizados
        run: pnpm schemas:check

      - name: Pruebas del piloto supervisado
        run: pnpm pilot:supervised:test

      - name: Eval del piloto supervisado
        run: pnpm pilot:supervised:eval

      - name: Data scan del piloto supervisado
        run: pnpm pilot:supervised:data-scan

      - name: Pruebas del conector SECOP
        run: pnpm secop:test

      - name: Evals offline del conector SECOP
        run: pnpm secop:eval

      - name: Pruebas de documentos SECOP
        run: pnpm secop:documents:test

      - name: Evals offline de documentos SECOP
        run: pnpm secop:documents:eval

      - name: Pruebas de oportunidades
        run: pnpm opportunities:test

      - name: Evals offline de oportunidades
        run: pnpm opportunities:eval

      - name: Pruebas de monitores y alertas
        run: pnpm monitors:test

      - name: Evals offline de monitores y alertas
        run: pnpm monitors:eval

      - name: Pruebas de entrega de notificaciones
        run: pnpm notifications:test

      - name: Evals offline y scans de notificaciones
        run: pnpm notifications:eval

      - name: Scan semantico de oportunidades
        run: pnpm opportunities:semantic-scan

      - name: Pruebas de autenticacion y permisos
        run: pnpm auth:test

      - name: Pruebas operativas
        run: pnpm ops:test

      - name: Eval end-to-end de piloto controlado
        run: pnpm pilot:eval

      - name: Eval de despliegue controlado
        run: pnpm deployment:eval

      - name: Verificacion de backup controlado
        run: pnpm deployment:backup-check

      - name: Eval de validacion controlada con usuarios piloto
        run: pnpm controlled:eval

      - name: Data scan de piloto controlado
        run: pnpm controlled:data-scan

      - name: Eval de cierre MVP controlado
        run: pnpm mvp:eval

      - name: Data scan final MVP
        run: pnpm mvp:data-scan

      - name: Pruebas de perfil de empresa
        run: pnpm company:test

      - name: Snapshot determinista de perfil de empresa
        run: pnpm company:snapshot-check

      - name: Pruebas de normalizacion
        run: pnpm normalization:test

      - name: Evals deterministas de normalizacion
        run: pnpm normalization:eval

      - name: Pruebas de evaluacion financiera
        run: pnpm financial:test

      - name: Evals deterministas de evaluacion financiera
        run: pnpm financial:eval

      - name: Pruebas de evaluadores especializados
        run: pnpm specialized:test

      - name: Evals deterministas de evaluadores especializados
        run: pnpm specialized:eval

      - name: Politica de decision valida
        run: pnpm decision:policy-check

      - name: Pruebas de decision deterministica
        run: pnpm decision:test

      - name: Evals deterministas de decision
        run: pnpm decision:eval

      - name: Pruebas de reporte de decision
        run: pnpm report:test

      - name: Evals deterministas de reporte de decision
        run: pnpm report:eval

      - name: Formato
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Pruebas
        run: pnpm test

      - name: Pruebas de extraccion documental
        run: pnpm extraction:test

      - name: Build web
        run: pnpm build

      - name: Repositorio sin cambios tras las validaciones
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"
