services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: pliegocheck
      POSTGRES_PASSWORD: pliegocheck
      POSTGRES_DB: pliegocheck
    ports:
      - "56543:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pliegocheck -d pliegocheck"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
