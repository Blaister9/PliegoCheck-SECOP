[project]
name = "pliegocheck-schemas"
version = "0.1.0"
description = "Contratos compartidos y versionados de PliegoCheck-SECOP"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pliegocheck_schemas"]
