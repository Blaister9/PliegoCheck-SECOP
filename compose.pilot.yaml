name: pliegocheck-controlled-pilot

services:
  postgres:
    image: postgres:17
    container_name: pliegocheck-controlled-postgres
    environment:
      POSTGRES_USER: pliegocheck
      POSTGRES_PASSWORD: pliegocheck
      POSTGRES_DB: pliegocheck
    ports:
      - "56543:5432"
    volumes:
      - controlled-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pliegocheck -d pliegocheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  controlled-storage:
    image: busybox:1.36
    container_name: pliegocheck-controlled-storage
    command:
      ["sh", "-c", "mkdir -p /var/pliegocheck/documents /var/pliegocheck/backups && sleep infinity"]
    volumes:
      - ./var/documents:/var/pliegocheck/documents
      - ./var/backups:/var/pliegocheck/backups
    healthcheck:
      test: ["CMD-SHELL", "test -d /var/pliegocheck/documents && test -d /var/pliegocheck/backups"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  controlled-postgres-data:
