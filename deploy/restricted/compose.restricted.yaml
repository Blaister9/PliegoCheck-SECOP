name: pliegocheck-restricted

x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: ${PLIEGOCHECK_LOG_MAX_SIZE:-10m}
      max-file: ${PLIEGOCHECK_LOG_MAX_FILES:-5}

x-backend-environment: &backend-environment
  PLIEGOCHECK_DEPLOYMENT_MODE: restricted
  PLIEGOCHECK_ENVIRONMENT: pilot
  PLIEGOCHECK_DATABASE_URL_FILE: /run/secrets/database_url
  PLIEGOCHECK_SESSION_SECRET_FILE: /run/secrets/session_secret
  PLIEGOCHECK_STORAGE_PATH: /var/lib/pliegocheck/storage
  PLIEGOCHECK_ALLOWED_WEB_ORIGINS: ${PLIEGOCHECK_ALLOWED_ORIGINS}
  PLIEGOCHECK_CORS_ALLOWED_ORIGINS: ${PLIEGOCHECK_ALLOWED_ORIGINS}
  PLIEGOCHECK_TRUSTED_HOSTS: 127.0.0.1,${PLIEGOCHECK_TRUSTED_HOSTS}
  PLIEGOCHECK_AUTH_ENABLED: "true"
  PLIEGOCHECK_AUTH_COOKIE_SECURE: "true"
  PLIEGOCHECK_AUTH_COOKIE_SAMESITE: ${PLIEGOCHECK_COOKIE_SAMESITE:-lax}
  PLIEGOCHECK_AUTH_SESSION_TTL_MINUTES: ${PLIEGOCHECK_SESSION_TTL_MINUTES:-480}
  PLIEGOCHECK_SECURITY_HEADERS_ENABLED: "true"
  PLIEGOCHECK_AI_ENABLED: "false"
  PLIEGOCHECK_SECOP_ENABLED: ${PLIEGOCHECK_SECOP_ENABLED:-false}
  PLIEGOCHECK_SECOP_DOCUMENT_SYNC_ENABLED: ${PLIEGOCHECK_SECOP_DOCUMENT_SYNC_ENABLED:-false}
  PLIEGOCHECK_SECOP_DOCUMENT_DOWNLOAD_ENABLED: ${PLIEGOCHECK_SECOP_DOCUMENT_DOWNLOAD_ENABLED:-false}
  PLIEGOCHECK_MONITORING_ENABLED: ${PLIEGOCHECK_MONITORING_ENABLED:-false}
  PLIEGOCHECK_EXTERNAL_DELIVERY_ENABLED: ${PLIEGOCHECK_EXTERNAL_DELIVERY_ENABLED:-false}
  PLIEGOCHECK_NOTIFICATION_DRY_RUN: ${PLIEGOCHECK_NOTIFICATION_DRY_RUN:-true}
  PLIEGOCHECK_EMAIL_ENABLED: ${PLIEGOCHECK_EMAIL_ENABLED:-false}
  PLIEGOCHECK_WEBHOOK_ENABLED: ${PLIEGOCHECK_WEBHOOK_ENABLED:-false}
  PLIEGOCHECK_LOG_LEVEL: ${PLIEGOCHECK_LOG_LEVEL:-INFO}
  PLIEGOCHECK_VERSION: ${PLIEGOCHECK_VERSION:-0.1.0}
  PLIEGOCHECK_COMMIT: ${PLIEGOCHECK_COMMIT:-unknown}

services:
  reverse-proxy:
    image: nginx:1.27.5-alpine
    <<: *security
    user: "101:101"
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=32m,uid=101,gid=101,mode=0700
      - /var/run:rw,noexec,nosuid,size=1m,uid=101,gid=101,mode=0700
      - /tmp:rw,noexec,nosuid,size=16m,uid=101,gid=101,mode=0700
    ports:
      - "${PLIEGOCHECK_BIND_ADDRESS:-127.0.0.1}:${PLIEGOCHECK_HTTP_PORT:-8080}:8080"
      - "${PLIEGOCHECK_BIND_ADDRESS:-127.0.0.1}:${PLIEGOCHECK_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${PLIEGOCHECK_TLS_CERT_FILE}:/run/tls/tls.crt:ro
      - ${PLIEGOCHECK_TLS_KEY_FILE}:/run/tls/tls.key:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider --no-check-certificate https://127.0.0.1:8443/api/health/live",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    image: pliegocheck-web:${PLIEGOCHECK_IMAGE_TAG:-restricted}
    build:
      context: ../..
      dockerfile: deploy/restricted/Dockerfile.web
      args:
        PLIEGOCHECK_VERSION: ${PLIEGOCHECK_VERSION:-0.1.0}
        PLIEGOCHECK_COMMIT: ${PLIEGOCHECK_COMMIT:-unknown}
        NEXT_PUBLIC_API_BASE_URL: /api
    <<: *security
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    expose:
      - "3000"
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    image: pliegocheck-backend:${PLIEGOCHECK_IMAGE_TAG:-restricted}
    build:
      context: ../..
      dockerfile: deploy/restricted/Dockerfile.backend
      args:
        PLIEGOCHECK_VERSION: ${PLIEGOCHECK_VERSION:-0.1.0}
        PLIEGOCHECK_COMMIT: ${PLIEGOCHECK_COMMIT:-unknown}
    <<: *security
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment:
      <<: *backend-environment
      FORWARDED_ALLOW_IPS: ${PLIEGOCHECK_TRUSTED_PROXY_CIDRS}
    command:
      [
        "uvicorn",
        "pliegocheck_api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "${PLIEGOCHECK_TRUSTED_PROXY_CIDRS}",
      ]
    volumes:
      - ${PLIEGOCHECK_DATABASE_URL_FILE}:/run/secrets/database_url:ro
      - ${PLIEGOCHECK_SESSION_SECRET_FILE}:/run/secrets/session_secret:ro
      - ${PLIEGOCHECK_STORAGE_PATH}:/var/lib/pliegocheck/storage
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    image: pliegocheck-backend:${PLIEGOCHECK_IMAGE_TAG:-restricted}
    <<: *security
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    environment:
      <<: *backend-environment
    command: ["python", "/app/restricted-runtime.py", "worker"]
    volumes:
      - ${PLIEGOCHECK_DATABASE_URL_FILE}:/run/secrets/database_url:ro
      - ${PLIEGOCHECK_SESSION_SECRET_FILE}:/run/secrets/session_secret:ro
      - ${PLIEGOCHECK_STORAGE_PATH}:/var/lib/pliegocheck/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; import time; p=Path('/tmp/pliegocheck-heartbeat'); raise SystemExit(0 if p.exists() and time.time()-p.stat().st_mtime<180 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 6

  scheduler:
    image: pliegocheck-backend:${PLIEGOCHECK_IMAGE_TAG:-restricted}
    profiles: ["scheduler"]
    <<: *security
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    environment:
      <<: *backend-environment
      PLIEGOCHECK_SCHEDULER_ENABLED: ${PLIEGOCHECK_SCHEDULER_ENABLED:-false}
      PLIEGOCHECK_MONITOR_SCHEDULER_INTERVAL_SECONDS: ${PLIEGOCHECK_MONITOR_SCHEDULER_INTERVAL_SECONDS:-60}
    command: ["python", "/app/restricted-runtime.py", "scheduler"]
    volumes:
      - ${PLIEGOCHECK_DATABASE_URL_FILE}:/run/secrets/database_url:ro
      - ${PLIEGOCHECK_SESSION_SECRET_FILE}:/run/secrets/session_secret:ro
      - ${PLIEGOCHECK_STORAGE_PATH}:/var/lib/pliegocheck/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; import time; p=Path('/tmp/pliegocheck-heartbeat'); raise SystemExit(0 if p.exists() and time.time()-p.stat().st_mtime<180 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 6

  postgres:
    image: postgres:17.5-bookworm
    <<: *security
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_DB: pliegocheck
      POSTGRES_USER: pliegocheck
      POSTGRES_PASSWORD_FILE: /run/secrets/database_password
      TZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${PLIEGOCHECK_DATABASE_PASSWORD_FILE}:/run/secrets/database_password:ro
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pliegocheck -d pliegocheck"]
      interval: 10s
      timeout: 5s
      retries: 12

networks:
  frontend:
  backend:
    internal: true

volumes:
  postgres-data:
